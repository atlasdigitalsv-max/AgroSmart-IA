<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroRed - AgroSmart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/modern_agro.css">
    <style>
        .agrored-layout {
            display: grid;
            grid-template-columns: 250px 1fr 300px;
            gap: 20px;
            align-items: start;
        }
        
        @media (max-width: 991px) {
            .agrored-layout {
                grid-template-columns: 1fr;
            }
            .agrored-sidebar-left, .agrored-sidebar-right {
                display: none; /* Can be toggled with buttons on mobile */
            }
        }

        .post-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
        }

        .post-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--primary-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            object-fit: cover;
        }

        .compose-post {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
        }

        .compose-input {
            border: none;
            background: rgba(0,0,0,0.03);
            border-radius: 12px;
            padding: 15px;
            width: 100%;
            resize: none;
            outline: none;
        }
        .compose-input:focus {
            background: rgba(0,0,0,0.05);
        }

        .ad-card {
            background: linear-gradient(135deg, rgba(255, 230, 0, 0.1), rgba(255, 166, 0, 0.1));
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 166, 0, 0.3);
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .ad-img {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            object-fit: cover;
        }

        .sidebar-section {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
        }

        .friend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-main);
            transition: background 0.3s;
        }
        .friend-item:hover {
            background: rgba(0,0,0,0.05);
        }
        
        .support-btn {
            background: linear-gradient(135deg, #0d6efd, #0dcaf0);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 15px;
            width: 100%;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            transition: transform 0.2s;
        }
        .support-btn:hover {
            transform: scale(1.02);
            color: white;
        }

        .btn-post {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            transition: opacity 0.3s;
        }
        .btn-post:hover {
            opacity: 0.9;
        }

    </style>
</head>
<body class="page-body">
    <div id="navbar-container"></div>

    <div class="container mt-4 mb-5 animate-slide-up">
        <h2 class="mb-4 d-flex align-items-center gap-2">
            <i class="bi bi-globe-americas text-primary"></i> AgroRed
        </h2>

        <div class="agrored-layout">
            
            <!-- Sidebar Izquierda: Herramientas y Soporte -->
            <div class="agrored-sidebar-left">
                <a href="chat_detail.html?support=true" class="support-btn mb-4">
                    <i class="bi bi-headset" style="font-size: 1.5rem;"></i>
                    Soporte Técnico 24/7
                </a>

                <div class="sidebar-section">
                    <h6 class="fw-bold mb-3 text-muted">Mis Cooperativas</h6>
                    <div id="org-groups-list">
                        <!-- Generado via JS -->
                        <div class="text-center small text-muted">Cargando grupos...</div>
                    </div>
                </div>
            </div>

            <!-- Feed Central -->
            <div class="agrored-feed">
                <!-- Compose Post -->
                <div class="compose-post">
                    <div class="d-flex gap-3">
                        <div id="my-avatar" class="post-avatar">U</div>
                        <div class="flex-grow-1">
                            <textarea id="post-input" class="compose-input" rows="2" placeholder="¿Qué estás pensando hoy sobre tus cultivos?"></textarea>
                            <div class="d-flex justify-content-between align-items-center mt-2">
                                <input type="file" id="post-image-input" accept="image/*" style="display: none;" onchange="handlePostImageSelect(event)">
                                <button class="btn btn-light btn-sm text-muted rounded-pill px-3" onclick="document.getElementById('post-image-input').click()">
                                    <i class="bi bi-image me-1"></i> Foto
                                </button>
                                <span id="post-image-preview" class="small text-success ms-2 fw-bold" style="display:none;"><i class="bi bi-check-circle"></i> Imagen Lista</span>
                                <button class="btn btn-sm btn-outline-danger ms-2" id="post-image-remove" style="display:none; padding: 2px 6px; font-size: 10px; border-radius: 50%;" onclick="removePostImage()">✕</button>
                                <button class="btn-post" onclick="publishPost()">Publicar</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Feed Wall -->
                <div id="feed-wall">
                    <div class="text-center p-5 text-muted">
                        <div class="spinner-border text-primary" role="status"></div>
                        <p class="mt-2">Cargando publicaciones...</p>
                    </div>
                </div>
            </div>

            <!-- Sidebar Derecha: Amigos -->
            <div class="agrored-sidebar-right">
                <div class="sidebar-section">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h6 class="fw-bold m-0 text-muted">Mis Amigos</h6>
                        <button class="btn btn-sm btn-outline-primary rounded-pill py-0" onclick="openAddFriendModal()">+ Añadir</button>
                    </div>
                    
                    <div id="friends-list">
                        <!-- Generado via JS -->
                    </div>
                    
                    <hr>
                    <h6 class="fw-bold mb-3 text-muted" style="font-size: 0.8rem;">Solicitudes Pendientes</h6>
                    <div id="friend-requests-list">
                        <!-- Generado via JS -->
                        <div class="text-muted small text-center">No hay solicitudes</div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/config.js"></script>
    <script src="js/database.js"></script>
    <script src="js/layout.js"></script>

    <script>
        let currentUser = null;
        let allUsersCache = [];

        const ADS_POOL = [
            {
                title: "Fertilizante NPK 15-15-15 Premium",
                desc: "Potencia el crecimiento y rendimiento de tus cultivos con Amazon Agro. Envío gratis.",
                img: "https://images.unsplash.com/photo-1628186121487-73d2a71d1c14?auto=format&fit=crop&q=80&w=200",
                link: "#"
            },
            {
                title: "Abono Orgánico Compostado 50kg",
                desc: "Ideal para hortalizas y frutales. Recupera la salud de tu suelo hoy.",
                img: "https://images.unsplash.com/photo-1596701026362-e64e525164d1?auto=format&fit=crop&q=80&w=200",
                link: "#"
            },
            {
                title: "Fungicida y Fertilizante Foliar 2en1",
                desc: "Protege tu siembra de plagas mientras nutres las hojas directamente.",
                img: "https://images.unsplash.com/photo-1592982537447-6f2c3c6f966d?auto=format&fit=crop&q=80&w=200",
                link: "#"
            }
        ];

        let pendingBase64Image = null;

        function handlePostImageSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            // Comprimir la imagen usando Canvas
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function(e) {
                const img = new Image();
                img.src = e.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 600; // Reducir ancho máximo para ahorrar BD
                    const MAX_HEIGHT = 600;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                    } else {
                        if (height > MAX_HEIGHT) {
                            width *= MAX_HEIGHT / height;
                            height = MAX_HEIGHT;
                        }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // Comprimir a JPEG con calidad 0.6 (60%)
                    pendingBase64Image = canvas.toDataURL('image/jpeg', 0.6);
                    
                    document.getElementById('post-image-preview').style.display = 'inline-block';
                    document.getElementById('post-image-remove').style.display = 'inline-block';
                };
            };
        }

        function removePostImage() {
            pendingBase64Image = null;
            document.getElementById('post-image-input').value = '';
            document.getElementById('post-image-preview').style.display = 'none';
            document.getElementById('post-image-remove').style.display = 'none';
        }

        async function initAgroRed() {
            await window.initLayout('agrored');
            await AuthObj.requireAuth();
            currentUser = await AuthObj.getCurrentUser();
            
            // Plan Security Check for AgroRed
            if (currentUser.role !== 'global_owner') {
                const countries = await window.DB.getCountries();
                const country = countries.find(c => String(c.id) === String(currentUser.country_id));
                const plan = country ? (country.plan || 'none').toLowerCase() : 'none';
                
                if (!['platinium', 'diamante', 'esmeralda'].includes(plan)) {
                    if (typeof Swal !== 'undefined') {
                        await Swal.fire({
                            icon: 'error',
                            title: 'Acceso Denegado',
                            text: 'AgroRed es una característica exclusiva de los planes Platinium, Diamante y Esmeralda.',
                            confirmButtonColor: '#10b981'
                        });
                    } else {
                        alert('Acceso Denegado. Requiere plan Platinium o superior.');
                    }
                    window.location.replace('dashboard.html');
                    return;
                }
            }

            allUsersCache = await window.DB.getAllUsers();

            // Set my avatar
            const myAvatar = document.getElementById('my-avatar');
            if (currentUser.avatar_url) {
                myAvatar.innerHTML = `<img src="${currentUser.avatar_url}" style="width:100%; height:100%; object-fit:cover; border-radius:50%;">`;
            } else {
                myAvatar.textContent = (currentUser.full_name || currentUser.email).charAt(0).toUpperCase();
            }

            loadFeed();
            loadGroups();
            loadFriends();
            
            // Poll for updates
            setInterval(loadFeed, 10000);
            setInterval(loadFriends, 15000);
        }

        function escapeHTML(str) {
            return (str || '').replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        }

        function getAvatarHtml(user) {
            if (user && user.avatar_url) {
                return `<img src="${user.avatar_url}" style="width:100%; height:100%; object-fit:cover; border-radius:50%;">`;
            }
            return (user?.full_name || user?.email || 'U').charAt(0).toUpperCase();
        }

        async function publishPost() {
            const input = document.getElementById('post-input');
            const content = input.value.trim();
            if (!content && !pendingBase64Image) return;
            
            try {
                input.disabled = true;
                const postBtn = document.querySelector('.btn-post');
                postBtn.disabled = true;
                postBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>';

                await window.DB.createPost(currentUser.id, content, pendingBase64Image);
                
                input.value = '';
                removePostImage();
                await loadFeed();
                Toast.fire({ icon: 'success', title: 'Publicado con éxito' });
            } catch(e) {
                window.showErrorModal('Error', 'No se pudo publicar: ' + e.message);
            } finally {
                input.disabled = false;
                const postBtn = document.querySelector('.btn-post');
                postBtn.disabled = false;
                postBtn.innerHTML = 'Publicar';
            }
        }

        async function likePost(postId) {
            let likedPosts = JSON.parse(localStorage.getItem('liked_posts') || '[]');
            if (likedPosts.includes(postId)) return;

            try {
                await window.DB.likePost(postId);
                
                // Guardar en local storage para prevenir doble like en recarga
                likedPosts.push(postId);
                localStorage.setItem('liked_posts', JSON.stringify(likedPosts));

                // Optimistic UI update
                const btn = document.getElementById(`like-btn-${postId}`);
                if (btn) {
                    const countSpan = btn.querySelector('.like-count');
                    countSpan.textContent = parseInt(countSpan.textContent) + 1;
                    btn.classList.replace('text-muted', 'text-danger');
                    btn.querySelector('i').classList.replace('bi-heart', 'bi-heart-fill');
                    btn.disabled = true;
                }
            } catch(e) {
                console.error(e);
            }
        }

        async function loadFeed() {
            const posts = await window.DB.getPosts();
            const container = document.getElementById('feed-wall');
            let html = '';

            if (posts.length === 0) {
                html = `<div class="text-center p-5 text-muted">Aún no hay publicaciones. ¡Sé el primero en compartir algo!</div>`;
            } else {
                let postCount = 0;
                
                for (const post of posts) {
                    const u = post.users || allUsersCache.find(x => x.id === post.user_id) || {};
                    const isGlobalOwner = u.role === 'global_owner';
                    const badge = isGlobalOwner ? `<i class="bi bi-patch-check-fill text-primary" title="Verificado"></i>` : '';
                    
                    const timeAgo = new Date(post.created_at).toLocaleDateString([], { month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit'});
                    const isMyPost = post.user_id === currentUser.id || currentUser.role === 'global_owner';
                    
                    let postOptions = '';
                    if (isMyPost) {
                        postOptions = `
                            <div class="dropdown">
                                <button class="btn btn-link text-muted p-0 text-decoration-none" data-bs-toggle="dropdown"><i class="bi bi-three-dots-vertical"></i></button>
                                <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0">
                                    <li><button class="dropdown-item small" onclick="editPost(${post.id}, '${escapeHTML(post.content).replace(/'/g, "\\'")}')"><i class="bi bi-pencil me-2"></i>Editar</button></li>
                                    <li><button class="dropdown-item small text-danger" onclick="deletePost(${post.id})"><i class="bi bi-trash me-2"></i>Eliminar</button></li>
                                </ul>
                            </div>
                        `;
                    }

                    const comments = await window.DB.getPostComments(post.id);
                    let commentsHtml = '';
                    comments.forEach(c => {
                        const cu = c.users || allUsersCache.find(x => x.id === c.user_id) || {};
                        commentsHtml += `
                            <div class="d-flex gap-2 mb-2">
                                <div style="width:25px; height:25px; font-size:10px;" class="post-avatar shadow-sm border overflow-hidden p-0 flex-shrink-0">${getAvatarHtml(cu)}</div>
                                <div class="bg-light p-2 rounded-3 flex-grow-1" style="font-size: 13px;">
                                    <div class="fw-bold text-main" style="font-size:11px;">${escapeHTML(cu.full_name || cu.email)}</div>
                                    ${escapeHTML(c.content)}
                                </div>
                            </div>
                        `;
                    });

                    const likedPosts = JSON.parse(localStorage.getItem('liked_posts') || '[]');
                    const isLiked = likedPosts.includes(post.id);
                    const heartIcon = isLiked ? 'bi-heart-fill' : 'bi-heart';
                    const heartColor = isLiked ? 'text-danger' : 'text-muted';

                    html += `
                        <div class="post-card">
                            <div class="d-flex align-items-center justify-content-between mb-3">
                                <div class="d-flex align-items-center gap-3">
                                    <div class="post-avatar shadow-sm" style="overflow:hidden; padding:0; border:1px solid var(--border-color);">${getAvatarHtml(u)}</div>
                                    <div>
                                        <div class="fw-bold mb-0" style="color:var(--text-main);">${escapeHTML(u.full_name || u.email)} ${badge}</div>
                                        <div class="text-muted small">${timeAgo}</div>
                                    </div>
                                </div>
                                ${postOptions}
                            </div>
                            <div class="post-body mb-3">
                                ${escapeHTML(post.content).replace(/\\n/g, '<br>')}
                                ${post.image_url ? `<div class="mt-3"><img src="${post.image_url}" class="img-fluid rounded-3 shadow-sm w-100" style="max-height: 400px; object-fit: cover;" alt="Post image"></div>` : ''}
                            </div>
                            <div class="post-actions border-top pt-2 d-flex gap-4">
                                <button id="like-btn-${post.id}" class="btn btn-link text-decoration-none ${heartColor} p-0 d-flex align-items-center gap-1" onclick="likePost(${post.id})" ${isLiked ? 'disabled' : ''}>
                                    <i class="bi ${heartIcon}"></i> <span class="like-count">${post.likes_count || 0}</span> Me gusta
                                </button>
                                <button class="btn btn-link text-decoration-none text-muted p-0 d-flex align-items-center gap-1" onclick="toggleComments(${post.id})">
                                    <i class="bi bi-chat-dots"></i> ${comments.length} Comentarios
                                </button>
                            </div>
                            <!-- Comments Section -->
                            <div id="comments-${post.id}" class="mt-3 pt-3 border-top" style="display:none;">
                                ${commentsHtml}
                                <div class="d-flex gap-2 mt-2">
                                    <div style="width:25px; height:25px; font-size:10px;" class="post-avatar shadow-sm border overflow-hidden p-0 flex-shrink-0">${getAvatarHtml(currentUser)}</div>
                                    <div class="input-group input-group-sm">
                                        <input type="text" id="comment-input-${post.id}" class="form-control" placeholder="Escribe un comentario..." onkeypress="if(event.key === 'Enter') submitComment(${post.id})">
                                        <button class="btn btn-outline-primary" type="button" onclick="submitComment(${post.id})">Enviar</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;

                    postCount++;

                    // Inject AD every 3 posts
                    if (postCount % 3 === 0) {
                        const ad = ADS_POOL[(postCount / 3) % ADS_POOL.length];
                        html += `
                            <div class="ad-card">
                                <img src="${ad.img}" class="ad-img" alt="Ad">
                                <div>
                                    <span class="badge bg-warning text-dark mb-1" style="font-size:0.6rem;">Patrocinado</span>
                                    <h6 class="fw-bold mb-1">${ad.title}</h6>
                                    <p class="small text-muted mb-0" style="line-height:1.2;">${ad.desc}</p>
                                </div>
                            </div>
                        `;
                    }
                }
            }

            container.innerHTML = html;
        }

        window.deletePost = async function(id) {
            const confirmed = await Swal.fire({
                title: '¿Eliminar publicación?',
                text: "No podrás revertir esto.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: 'var(--primary-color)',
                confirmButtonText: 'Sí, eliminar',
                cancelButtonText: 'Cancelar'
            });
            if (confirmed.isConfirmed) {
                try {
                    await window.DB.deletePost(id);
                    await loadFeed();
                    Toast.fire({ icon: 'success', title: 'Publicación eliminada' });
                } catch(e) { window.showErrorModal('Error', e.message); }
            }
        };

        window.editPost = async function(id, currentContent) {
            const { value: text } = await Swal.fire({
                title: 'Editar publicación',
                input: 'textarea',
                inputValue: currentContent,
                showCancelButton: true,
                confirmButtonText: 'Guardar',
                cancelButtonText: 'Cancelar'
            });
            if (text && text.trim() !== '') {
                try {
                    await window.DB.updatePost(id, text.trim());
                    await loadFeed();
                    Toast.fire({ icon: 'success', title: 'Publicación actualizada' });
                } catch(e) { window.showErrorModal('Error', e.message); }
            }
        };

        window.toggleComments = function(postId) {
            const container = document.getElementById(`comments-${postId}`);
            if (container.style.display === 'none') {
                container.style.display = 'block';
            } else {
                container.style.display = 'none';
            }
        };

        window.submitComment = async function(postId) {
            const input = document.getElementById(`comment-input-${postId}`);
            const text = input.value.trim();
            if (!text) return;
            try {
                input.disabled = true;
                await window.DB.createPostComment(postId, currentUser.id, text);
                input.value = '';
                await loadFeed();
                // Re-open comments section
                document.getElementById(`comments-${postId}`).style.display = 'block';
            } catch(e) {
                console.error(e);
                window.showErrorModal('Error', 'No se pudo comentar.');
            } finally {
                input.disabled = false;
            }
        };

        async function loadGroups() {
            const container = document.getElementById('org-groups-list');
            const groups = await window.DB.getUserGroups(currentUser.id);
            
            if (groups.length === 0) {
                container.innerHTML = `<div class="text-muted small text-center p-3">No perteneces a ninguna cooperativa/grupo activo.</div>`;
                return;
            }

            let html = '';
            for (const g of groups) {
                html += `
                    <a href="chat_detail.html?group_id=${g.id}" class="friend-item">
                        <div class="post-avatar" style="width:35px;height:35px;font-size:0.9rem;background:var(--secondary-color);color:var(--primary-color);">👥</div>
                        <div class="text-truncate fw-bold" style="font-size: 14px;">${escapeHTML(g.name)}</div>
                    </a>
                `;
            }
            container.innerHTML = html;
        }

        async function loadFriends() {
            const friendships = await window.DB.getFriendships(currentUser.id);
            const friendsContainer = document.getElementById('friends-list');
            const requestsContainer = document.getElementById('friend-requests-list');

            let friendsHtml = '';
            let requestsHtml = '';

            for (const f of friendships) {
                const otherUserId = f.user_id1 === currentUser.id ? f.user_id2 : f.user_id1;
                const otherUser = allUsersCache.find(u => u.id === otherUserId);
                if (!otherUser) continue;

                const name = escapeHTML(otherUser.full_name || otherUser.email);

                if (f.status === 'accepted') {
                    // It's a friend
                    friendsHtml += `
                        <div class="friend-item d-flex align-items-center position-relative">
                            <a href="chat_detail.html?id=${otherUser.id}" class="d-flex align-items-center gap-2 text-decoration-none flex-grow-1 text-main">
                                <div class="post-avatar shadow-sm" style="width:35px;height:35px;font-size:0.9rem;border:1px solid var(--border-color);">${getAvatarHtml(otherUser)}</div>
                                <div class="text-truncate" style="font-size: 14px;">${name}</div>
                            </a>
                            <button class="btn btn-link text-danger p-0 ms-2" onclick="removeFriend(${f.id})" title="Eliminar amigo">
                                <i class="bi bi-person-x"></i>
                            </button>
                        </div>
                    `;
                } else if (f.status === 'pending' && f.user_id2 === currentUser.id) {
                    // Incoming request
                    requestsHtml += `
                        <div class="d-flex align-items-center gap-2 mb-2 p-2 border rounded bg-light">
                            <div class="post-avatar" style="width:30px;height:30px;font-size:0.8rem;">${getAvatarHtml(otherUser)}</div>
                            <div class="text-truncate small flex-grow-1">${name}</div>
                            <button class="btn btn-sm btn-primary py-0 px-2 rounded-pill" onclick="acceptFriend(${f.id})">Aceptar</button>
                        </div>
                    `;
                }
            }

            friendsContainer.innerHTML = friendsHtml || '<div class="text-muted small text-center p-2">Aún no tienes amigos añadidos.</div>';
            requestsContainer.innerHTML = requestsHtml || '<div class="text-muted small text-center">No hay solicitudes</div>';
        }

        window.openAddFriendModal = async function() {
            // Find users who are not me and not already friends/pending
            const friendships = await window.DB.getFriendships(currentUser.id);
            const existingIds = friendships.map(f => f.user_id1 === currentUser.id ? f.user_id2 : f.user_id1);
            
            const potentialFriends = allUsersCache.filter(u => u.id !== currentUser.id && !existingIds.includes(u.id));

            let html = '';
            if (potentialFriends.length === 0) {
                html = '<p class="text-muted p-3">No hay usuarios nuevos sugeridos en tu región.</p>';
            } else {
                potentialFriends.forEach(u => {
                    html += `
                        <div class="d-flex justify-content-between align-items-center p-2 border-bottom">
                            <div class="d-flex align-items-center gap-2">
                                <div class="post-avatar" style="width:30px;height:30px;font-size:0.8rem;">${getAvatarHtml(u)}</div>
                                <span class="small fw-bold">${escapeHTML(u.full_name || u.email)}</span>
                            </div>
                            <button class="btn btn-sm btn-outline-primary rounded-pill py-0" onclick="sendRequest(${u.id}, this)">Agregar</button>
                        </div>
                    `;
                });
            }

            Swal.fire({
                title: 'Buscar Agricultores',
                html: `<div style="max-height: 300px; overflow-y: auto;" class="text-start">${html}</div>`,
                showConfirmButton: false,
                showCancelButton: true,
                cancelButtonText: 'Cerrar'
            });
        };

        window.sendRequest = async function(userId, btnElement) {
            try {
                btnElement.disabled = true;
                btnElement.textContent = "Enviado";
                await window.DB.sendFriendRequest(currentUser.id, userId);
                loadFriends();
            } catch(e) {
                window.showErrorModal('Error', e.message);
                btnElement.disabled = false;
                btnElement.textContent = "Agregar";
            }
        };

        window.acceptFriend = async function(friendshipId) {
            try {
                await window.DB.acceptFriendRequest(friendshipId);
                loadFriends();
                Toast.fire({ icon: 'success', title: '¡Amistad aceptada!' });
            } catch(e) {
                window.showErrorModal('Error', 'No se pudo aceptar la solicitud.');
            }
        };

        window.removeFriend = async function(friendshipId) {
            const confirmed = await Swal.fire({
                title: '¿Eliminar amigo?',
                text: "Esta acción borrará también el historial de chat con esta persona.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: 'var(--primary-color)',
                confirmButtonText: 'Sí, eliminar',
                cancelButtonText: 'Cancelar'
            });

            if (confirmed.isConfirmed) {
                try {
                    await window.DB.deleteFriendship(friendshipId);
                    loadFriends();
                    Toast.fire({ icon: 'success', title: 'Amigo eliminado' });
                } catch (e) {
                    window.showErrorModal('Error', 'No se pudo eliminar al amigo: ' + e.message);
                }
            }
        };

        document.addEventListener('DOMContentLoaded', initAgroRed);
    </script>
</body>
</html>
