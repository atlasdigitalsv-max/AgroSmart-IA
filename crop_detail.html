<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Cultivo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/modern_agro.css">
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.108/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.108/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>
<body class="page-body">
    <div id="navbar-container"></div>

    <div class="container mt-4 animate-slide-up">
        <div class="d-flex align-items-center mb-4 gap-3">
            <span class="icon-agro display-5">🌾</span>
            <h1 class="dashboard-title m-0">Detalle de Cultivo</h1>
        </div>
        
        <div class="detail-card mb-4 animate-slide-up animate-delay-1" id="crop-info">
            <!-- Info Injected via JS -->
        </div>

        <div id="weather-section" class="row mb-4 justify-content-center animate-slide-up animate-delay-2" style="display:none;">
            <!-- Weather Injected via JS -->
        </div>

        <div class="ai-recommendation mb-4 animate-slide-up animate-delay-3">
            <div class="d-flex align-items-center gap-2 mb-2">
                <span class="fs-4">🤖</span>
                <h5 class="m-0">Recomendación IA (Simulada)</h5>
            </div>
            <p id="ai-recommendation">Analizando datos del cultivo...</p>
        </div>

        <section class="mb-5 animate-slide-up animate-delay-3">
            <div class="detail-card">
                <h4 class="mb-4">🗺️ Mapa meteorológico</h4>
                <div class="map-search-wrapper mb-3">
                    <input id="detail-search-input" type="text" class="form-control map-search-input" placeholder="Buscar ubicación..." />
                    <button id="detail-search-btn" type="button" class="btn-primary map-search-btn btn-sm">Buscar</button>
                </div>
                <div id="detail-search-results" class="map-search-results mb-3"></div>
                <p id="weather-note" class="text-muted small mb-2">Usa la búsqueda para encontrar ubicaciones exactas.</p>
                <div id="weather-map" class="map-container">
                    <div class="map-zoom-controls animate-slide-up">
                        <button class="map-zoom-btn" type="button" onclick="if(window.viewer) window.viewer.camera.zoomIn(window.viewer.camera.positionCartographic.height * 0.5);" title="Acercar">+</button>
                        <button class="map-zoom-btn" type="button" onclick="if(window.viewer) window.viewer.camera.zoomOut(window.viewer.camera.positionCartographic.height * 0.5);" title="Alejar">−</button>
                    </div>
                </div>
            </div>
        </section>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/crop_catalog.js"></script>
    <script src="js/database.js"></script>
    <script src="js/layout.js"></script>

    <script>
        let crop;
        let detailMarker = null;

        async function initCropDetail() {
            // Render Navbar FIRST
            if (window.initLayout) await window.initLayout('crop_detail');

            // Then check auth
            await AuthObj.requireAuth();

            const urlParams = new URLSearchParams(window.location.search);
            const cropId = urlParams.get('id');
            const currentUser = await AuthObj.getCurrentUser();
            const allCrops = await window.DB.getAllCrops();
            crop = allCrops.find(c => c.id == cropId);

            if (!crop || (crop.user_id !== currentUser.id && !currentUser.is_superuser)) {
                window.location.href = 'dashboard.html';
                return;
            }

            // Check for catalog match
            const normalize = (s) => (s || "").toLowerCase().trim();
            const cName = normalize(crop.name);
            const catalog = window.CROP_CATALOG || {};
            const matchKey = Object.keys(catalog).find(k => normalize(catalog[k].name) === cName);
            const catalogEntry = matchKey ? catalog[matchKey] : null;
            let technicalSheetHtml = '';

            if (catalogEntry) {
                technicalSheetHtml = `
                    <div class="mt-4 pt-4 border-top">
                        <div class="d-flex align-items-center gap-2 mb-3">
                            <h5 class="m-0 text-success fw-bold">📋 Ficha Técnica del Catálogo</h5>
                            <span class="badge bg-success-soft text-success small">Vinculado</span>
                        </div>
                        <div class="row g-3">
                            <div class="col-md-12">
                                <div class="p-4 bg-light-soft rounded-4 border">
                                    <h6 class="small fw-bold text-muted text-uppercase mb-3">Requerimientos Técnicos</h6>
                                    <div class="row">
                                        <div class="col-md-4 mb-2">
                                            <div class="small text-muted mb-1">Temperatura Ideal</div>
                                            <div class="fw-bold">${catalogEntry.min_temp}°C - ${catalogEntry.max_temp}°C</div>
                                        </div>
                                        <div class="col-md-4 mb-2">
                                            <div class="small text-muted mb-1">Humedad Óptima</div>
                                            <div class="fw-bold">${catalogEntry.min_humidity}% - ${catalogEntry.max_humidity}%</div>
                                        </div>
                                        <div class="col-md-4 mb-2">
                                            <div class="small text-muted mb-1">Tipo de Suelo</div>
                                            <div class="fw-bold text-truncate" title="${catalogEntry.soil_type}">${catalogEntry.soil_type}</div>
                                        </div>
                                    </div>
                                    <div class="mt-3 pt-3 border-top small text-muted">
                                        <span class="me-2">📍 Fuente:</span>
                                        <span class="fw-medium text-dark">${catalogEntry.source || 'Estándar Agrícola 2024'}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }

            document.getElementById('crop-info').innerHTML = `
                <div class="detail-header mb-3">
                    <div class="d-flex justify-content-between align-items-center">
                        <h2 class="fw-bold m-0">${crop.name}</h2>
                        <span class="badge bg-success-soft text-success px-3 py-2 rounded-pill">Vigente</span>
                    </div>
                    ${catalogEntry ? `<p class="text-muted mt-1 italic small"><em>${catalogEntry.scientific_name}</em></p>` : ''}
                </div>
                <div class="row">
                    <div class="col-md-8">
                        <div class="info-label small text-muted text-uppercase fw-bold mb-1">Descripción del productor</div>
                        <div class="info-value mb-4">${crop.description}</div>
                    </div>
                    <div class="col-md-4">
                        <div class="info-label small text-muted text-uppercase fw-bold mb-1">Fecha de siembra</div>
                        <div class="info-value mb-3">${new Date(crop.sowing_date).toLocaleDateString()}</div>
                    </div>
                </div>

                ${technicalSheetHtml}
                
                <div class="action-bar mt-4 pt-3 d-flex flex-wrap gap-2">
                    <a href="crop_edit.html?id=${crop.id}" class="btn btn-agro-light btn-sm flex-grow-1">Editar Registro</a>
                    <a href="abono_application.html?id=${crop.id}" class="btn btn-agro-primary btn-sm flex-grow-1">Gestionar Abonos</a>
                    <button onclick="realDeleteCrop(${crop.id})" class="btn btn-outline-danger btn-sm">Eliminar</button>
                    <a href="dashboard.html" class="btn btn-secondary btn-sm">Volver</a>
                </div>
            `;

            // Initialize Map & Weather
            let lat = crop.latitude ? parseFloat(crop.latitude) : 13.7;
            let lng = crop.longitude ? parseFloat(crop.longitude) : -89.2;

            try {
                Cesium.Ion.defaultAccessToken = null;

                const satelliteProvider = await Cesium.ArcGisMapServerImageryProvider.fromUrl(
                    'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer',
                    { maximumLevel: 19 }
                );
                if (satelliteProvider?.errorEvent) satelliteProvider.errorEvent.addEventListener(e => e.retry = false);

                const viewer = new Cesium.Viewer('weather-map', {
                    animation: false,
                    baseLayerPicker: false,
                    fullscreenButton: false,
                    vrButton: false,
                    geocoder: false,
                    homeButton: false,
                    infoBox: false,
                    sceneModePicker: false,
                    selectionIndicator: false,
                    timeline: false,
                    navigationHelpButton: false,
                    navigationInstructionsInitiallyVisible: false,
                    scene3DOnly: true,
                    targetFrameRate: 60,
                    useDefaultRenderLoop: true,
                    baseLayer: Cesium.ImageryLayer.fromProviderAsync(Promise.resolve(satelliteProvider))
                });
                window.viewer = viewer;
                document.getElementById('weather-map').style.pointerEvents = 'auto';

                viewer.scene.mode = Cesium.SceneMode.SCENE3D;
                viewer.scene.globe.enableLighting = true;
                viewer.scene.globe.depthTestAgainstTerrain = true;

                const labelsProvider = await Cesium.ArcGisMapServerImageryProvider.fromUrl(
                    'https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer',
                    { maximumLevel: 19 }
                );
                if (labelsProvider?.errorEvent) labelsProvider.errorEvent.addEventListener(e => e.retry = false);
                viewer.imageryLayers.addImageryProvider(labelsProvider);

                viewer.camera.flyTo({ destination: Cesium.Cartesian3.fromDegrees(lng, lat, 10000.0) });

                let detailMarker = null;
                if (crop.polygon_area) {
                    try {
                        const coords = typeof crop.polygon_area === 'string' ? JSON.parse(crop.polygon_area) : crop.polygon_area;
                        if (coords && coords.length >= 3) {
                            const hierarchy = coords.map(pt => Cesium.Cartesian3.fromDegrees(pt.lng, pt.lat));
                            detailMarker = viewer.entities.add({
                                polygon: {
                                    hierarchy: new Cesium.PolygonHierarchy(hierarchy),
                                    material: Cesium.Color.fromCssColorString('#10b981').withAlpha(0.5),
                                    outline: true,
                                    outlineColor: Cesium.Color.YELLOW,
                                    outlineWidth: 3
                                },
                                position: Cesium.Cartesian3.fromDegrees(coords[0].lng, coords[0].lat),
                                label: { text: crop.name, font: '14pt sans-serif', style: Cesium.LabelStyle.FILL_AND_OUTLINE, outlineWidth: 2, verticalOrigin: Cesium.VerticalOrigin.BOTTOM, pixelOffset: new Cesium.Cartesian2(0, -9) }
                            });
                            viewer.camera.flyTo({ destination: Cesium.Cartesian3.fromDegrees(coords[0].lng, coords[0].lat, 5000.0) });
                        }
                    } catch(e) {}
                }
                
                if (!detailMarker) {
                    detailMarker = viewer.entities.add({
                        position: Cesium.Cartesian3.fromDegrees(lng, lat),
                        point: { pixelSize: 14, color: Cesium.Color.YELLOW, outlineColor: Cesium.Color.WHITE, outlineWidth: 2 },
                        label: { text: crop.name, font: '14pt sans-serif', style: Cesium.LabelStyle.FILL_AND_OUTLINE, outlineWidth: 2, verticalOrigin: Cesium.VerticalOrigin.BOTTOM, pixelOffset: new Cesium.Cartesian2(0, -9) }
                    });
                }

                if (CONFIG.OPENWEATHERMAP_API_KEY) {
                    const cloudsProvider = new Cesium.UrlTemplateImageryProvider({
                        url: `https://tile.openweathermap.org/map/clouds_new/{z}/{x}/{y}.png?appid=${CONFIG.OPENWEATHERMAP_API_KEY}`,
                        credit: 'Weather data © OpenWeatherMap',
                        maximumLevel: 10
                    });
                    const cloudsLayer = viewer.imageryLayers.addImageryProvider(cloudsProvider);
                    cloudsLayer.alpha = 0.8;
                }
            } catch (err) {
                console.warn("Map Init Error:", err);
                document.getElementById('weather-map').innerHTML = '<div class="alert alert-danger h-100 d-flex align-items-center justify-content-center">Error al inicializar el globo 3D. Verifica tu conexión a internet.</div>';
            }

            // Fetch Real Weather
            if (CONFIG.OPENWEATHERMAP_API_KEY) {
                try {
                    const url = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lng}&units=metric&lang=es&appid=${CONFIG.OPENWEATHERMAP_API_KEY}`;
                    const res = await fetch(url);
                    const data = await res.json();

                    document.getElementById('weather-section').style.display = 'flex';
                    document.getElementById('weather-section').innerHTML = `
                        <div class="col-md-3 mb-3">
                            <div class="weather-widget flex-column text-center h-100">
                                <div class="fs-1 mb-2">🌡️</div>
                                <div class="info-label">Temperatura</div>
                                <div class="weather-temp" style="font-size:1.8rem;">${data.main.temp}°C</div>
                            </div>
                        </div>
                        <div class="col-md-3 mb-3">
                            <div class="weather-widget flex-column text-center h-100">
                                <div class="fs-1 mb-2">💧</div>
                                <div class="info-label">Humedad</div>
                                <div class="weather-temp" style="font-size:1.8rem;">${data.main.humidity}%</div>
                            </div>
                        </div>
                        <div class="col-md-3 mb-3">
                            <div class="weather-widget flex-column text-center h-100">
                                <div class="fs-1 mb-2">🌧️</div>
                                <div class="info-label">Lluvia</div>
                                <div class="weather-temp" style="font-size:1.8rem;">${data.rain ? data.rain['1h'] : 0}<span class="fs-6">mm</span></div>
                            </div>
                        </div>
                        <div class="col-md-3 mb-3">
                            <div class="weather-widget flex-column text-center h-100">
                                <div class="fs-1 mb-2">💨</div>
                                <div class="info-label">Viento</div>
                                <div class="weather-temp" style="font-size:1.8rem;">${data.wind.speed}<span class="fs-6">m/s</span></div>
                            </div>
                        </div>
                    `;

                    // Generate AI Mock Recommendation
                    if(data.main.temp > 30 && data.rain === undefined) {
                        document.getElementById('ai-recommendation').innerText = 'Las temperaturas son altas y no hay lluvia. Se recomienda aumentar el riego en las próximas horas.';
                    } else if (data.rain) {
                        document.getElementById('ai-recommendation').innerText = 'Hay lluvia registrada. Suspender riego programado para evitar saturamiento de humedad en el suelo.';
                    } else {
                        document.getElementById('ai-recommendation').innerText = 'Condiciones climáticas estables. Mantén tu programa de riego habitual.';
                    }

                } catch(e) {
                    console.error("Error fetching weather", e);
                    document.getElementById('ai-recommendation').innerText = 'No se pudo generar recomendación (Error de red).';
                }
            } else {
                 document.getElementById('ai-recommendation').innerText = 'Requiere OPENWEATHERMAP_API_KEY para generar recomendaciones basadas en clima.';
            }
        }

        window.realDeleteCrop = async function(id) {
            const isConfirmed = await window.confirmActionModal(
                'Eliminar Cultivo',
                '¿Estás seguro de que quieres eliminar este registro de forma permanente?',
                'Sí, eliminar',
                'Cancelar'
            );
            if(isConfirmed) {
                await window.DB.deleteCrop(id);
                window.location.href = 'dashboard.html';
            }
        }

        document.addEventListener('DOMContentLoaded', initCropDetail);
    </script>
</body>
</html>
