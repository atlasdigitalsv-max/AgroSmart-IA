<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cultivo - AgroSmart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/modern_agro.css">
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.108/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.108/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="page-body">
    <div id="navbar-container"></div>

    <div class="container mt-5 animate-slide-up">
        <div class="agro-card mb-4 mx-auto animate-slide-up animate-delay-1" style="max-width: 600px;">
            <h2 id="form-title">Nuevo cultivo</h2>
            <form id="crop-form">
                <div class="form-group position-relative">
                    <label>Nombre del cultivo</label>
                    <input type="text" id="name" required autocomplete="off">
                    <div id="catalog-suggestions" class="list-group position-absolute w-100 shadow-sm" style="z-index: 1000; display: none; top: 100%;"></div>
                </div>
                <div id="catalog-sheet-preview" class="mt-2 mb-3 animate__animated animate__fadeIn" style="display:none;"></div>

                <div class="form-group">
                    <label>Descripción</label>
                    <textarea id="description" rows="3" required></textarea>
                </div>
                <div class="row">
                    <div class="col-md-6 form-group">
                        <label>Fecha de siembra</label>
                        <input type="date" id="sowing_date" class="form-control" required>
                    </div>
                </div>

                <input type="hidden" id="latitude">
                <input type="hidden" id="longitude">
                <input type="hidden" id="polygon_area" name="polygon_area">

                <div class="card themed-card mt-4 mb-4 border-0">
                    <div class="card-body p-0">
                        <h5 class="mb-3">Ubicación <span class="text-muted fw-normal fs-6">(haz clic en el mapa o busca una ubicación)</span></h5>
                        <div class="d-flex gap-2 mb-3">
                            <input id="map-search-input" type="text" class="form-control" placeholder="Buscar mi finca o ciudad..." />
                            <button id="map-search-btn" class="btn btn-agro-primary" type="button"><i class="bi bi-search"></i></button>
                            <button class="btn btn-info text-white" type="button" onclick="geolocateMe()" title="Mi Ubicación"><i class="bi bi-crosshair"></i></button>
                        </div>
                        <button id="btn-clear-polygon" type="button" class="btn-danger map-search-btn btn-sm" style="display:none;" title="Borrar terreno dibujado">🗑️ Limpiar Terreno</button>
                        <div id="crop-search-results" class="map-search-results"></div>
                        <div id="crop-map" class="map-container">
                            <div class="map-zoom-controls animate-slide-up">
                                <button class="map-zoom-btn" type="button" onclick="if(window.viewer) window.viewer.camera.zoomIn(window.viewer.camera.positionCartographic.height * 0.5);" title="Acercar">+</button>
                                <button class="map-zoom-btn" type="button" onclick="if(window.viewer) window.viewer.camera.zoomOut(window.viewer.camera.positionCartographic.height * 0.5);" title="Alejar">−</button>
                            </div>
                        </div>
                        <div id="climate-feedback" class="mt-3" style="display:none;"></div>
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <button type="submit" id="submit-btn" class="btn-primary w-auto">Guardar</button>
                    <a href="dashboard.html" class="btn-secondary btn-sm d-flex align-items-center">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/crop_catalog.js"></script>
    <script src="js/database.js"></script>
    <script src="js/layout.js"></script>
    
    <script>
        let editMode = false;
        let crop = null;
        let mapMarker = null;
        let polygonPoints = [];
        let drawingPolygon = null;
        let drawingPolyline = null;

        // Silenciar errores de promesas no capturadas (Típicos de red en CesiumJS cuando falla la conexión)
        window.addEventListener('unhandledrejection', function(event) {
            if (event.reason) {
                const msg = event.reason.message || '';
                if (msg.includes('Failed to fetch') || msg.includes('NetworkError') || 
                    (typeof event.reason === 'object' && event.reason.statusCode === undefined && event.reason.response === undefined)) {
                    event.preventDefault(); // Previene el "Uncaught (in promise)" en la consola
                }
            }
        });

        async function initCropForm() {
            // Render Navbar FIRST
            if (window.initLayout) await window.initLayout('crop_create');

            // Then check auth
            await AuthObj.requireAuth();

            const urlParams = new URLSearchParams(window.location.search);
            const cropId = urlParams.get('id');
            const currentUser = await AuthObj.getCurrentUser();

            if (cropId) {
                const crops = await window.DB.getAllCrops();
                crop = crops.find(c => c.id == cropId);
                if(crop && (crop.user_id === currentUser.id || currentUser.is_superuser)) {
                    editMode = true;
                    document.getElementById('form-title').innerText = 'Editar cultivo';
                    document.getElementById('submit-btn').innerText = 'Actualizar';
                    document.getElementById('name').value = crop.name;
                    document.getElementById('description').value = crop.description;
                    document.getElementById('sowing_date').value = crop.sowing_date;
                    document.getElementById('latitude').value = crop.latitude || '';
                    document.getElementById('longitude').value = crop.longitude || '';
                } else {
                    window.location.href = 'dashboard.html';
                    return;
                }
            }
            
            // Default Sowing Date if not editing
            if (!editMode) {
                document.getElementById('sowing_date').value = new Date().toISOString().split('T')[0];
                
                // Handle Preset from Catalog
                const presetName = urlParams.get('preset');
                if (presetName && window.CROP_CATALOG) {
                    // Try exact match or find by normalized name
                    const normalize = (s) => (s || "").toLowerCase().trim();
                    const pName = normalize(presetName);
                    const catalog = window.CROP_CATALOG;
                    const matchKey = Object.keys(catalog).find(k => normalize(catalog[k].name) === pName);
                    
                    if (matchKey) {
                        selectFromCatalog(catalog[matchKey]);
                    }
                }
            }

            // Initialize Map
            let center = editMode && crop.latitude && crop.longitude ? [parseFloat(crop.latitude), parseFloat(crop.longitude)] : [13.7, -89.2];

            try {
                Cesium.Ion.defaultAccessToken = null;

                const satelliteProvider = await Cesium.ArcGisMapServerImageryProvider.fromUrl(
                    'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer',
                    { maximumLevel: 19 }
                );
                if (satelliteProvider?.errorEvent) satelliteProvider.errorEvent.addEventListener(e => e.retry = false);

                viewer = new Cesium.Viewer('crop-map', {
                    animation: false,
                    baseLayerPicker: false,
                    fullscreenButton: false,
                    vrButton: false,
                    geocoder: false,
                    homeButton: false,
                    infoBox: false,
                    sceneModePicker: false,
                    selectionIndicator: false,
                    timeline: false,
                    navigationHelpButton: false,
                    navigationInstructionsInitiallyVisible: false,
                    scene3DOnly: true,
                    targetFrameRate: 60,
                    useDefaultRenderLoop: true,
                    baseLayer: Cesium.ImageryLayer.fromProviderAsync(Promise.resolve(satelliteProvider))
                });
                window.viewer = viewer;
                document.getElementById('crop-map').style.pointerEvents = 'auto';

                viewer.resolutionScale = 1.0;
                viewer.scene.mode = Cesium.SceneMode.SCENE3D;
                viewer.scene.globe.enableLighting = true;
                viewer.scene.globe.depthTestAgainstTerrain = true;
                viewer.scene.globe.maximumScreenSpaceError = 2.0;
                
                viewer.scene.requestRenderMode = false;

                const labelsProvider = await Cesium.ArcGisMapServerImageryProvider.fromUrl(
                    'https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer',
                    { maximumLevel: 19 }
                );
                if (labelsProvider?.errorEvent) labelsProvider.errorEvent.addEventListener(e => e.retry = false);
                viewer.imageryLayers.addImageryProvider(labelsProvider);

                // Add Transportation Layer for visible roads
                const roadsProvider = await Cesium.ArcGisMapServerImageryProvider.fromUrl(
                    'https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Transportation/MapServer',
                    { maximumLevel: 19 }
                );
                if (roadsProvider?.errorEvent) roadsProvider.errorEvent.addEventListener(e => e.retry = false);
                viewer.imageryLayers.addImageryProvider(roadsProvider);

                viewer.camera.flyTo({ destination: Cesium.Cartesian3.fromDegrees(center[1], center[0], 200000.0) });

                const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
                handler.setInputAction(function(click) {
                    const cartesian = viewer.camera.pickEllipsoid(click.position, viewer.scene.globe.ellipsoid);
                    if (cartesian) {
                        const cartographic = Cesium.Cartographic.fromCartesian(cartesian);
                        const lon = Cesium.Math.toDegrees(cartographic.longitude);
                        const lat = Cesium.Math.toDegrees(cartographic.latitude);
                        
                        polygonPoints.push(cartesian);

                        if (polygonPoints.length === 1) {
                            document.getElementById('latitude').value = lat.toFixed(6);
                            document.getElementById('longitude').value = lon.toFixed(6);
                            document.getElementById('polygon_area').value = JSON.stringify([{lat, lng: lon}]);
                            
                            if (mapMarker) {
                                mapMarker.position = cartesian;
                            } else {
                                mapMarker = viewer.entities.add({
                                    position: cartesian,
                                    point: { pixelSize: 14, color: Cesium.Color.YELLOW, outlineColor: Cesium.Color.WHITE, outlineWidth: 2 }
                                });
                            }
                            updateClimateFeedback(lat, lon);
                            document.getElementById('btn-clear-polygon').style.display = 'inline-block';
                        } else {
                            const coords = polygonPoints.map(p => {
                                const carto = Cesium.Cartographic.fromCartesian(p);
                                return { lat: Cesium.Math.toDegrees(carto.latitude), lng: Cesium.Math.toDegrees(carto.longitude) };
                            });
                            document.getElementById('polygon_area').value = JSON.stringify(coords);

                            if (polygonPoints.length === 2 && !drawingPolyline) {
                                drawingPolyline = viewer.entities.add({
                                    polyline: {
                                        positions: new Cesium.CallbackProperty(() => polygonPoints, false),
                                        width: 3,
                                        material: Cesium.Color.YELLOW
                                    }
                                });
                            } else if (polygonPoints.length >= 3 && !drawingPolygon) {
                                drawingPolygon = viewer.entities.add({
                                    polygon: {
                                        hierarchy: new Cesium.CallbackProperty(() => new Cesium.PolygonHierarchy(polygonPoints), false),
                                        material: Cesium.Color.fromCssColorString('#10b981').withAlpha(0.5),
                                        outline: true,
                                        outlineColor: Cesium.Color.YELLOW,
                                        outlineWidth: 3
                                    }
                                });
                            }
                        }
                    }
                }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

                if (editMode) {
                    if (crop.polygon_area) {
                        try {
                            const coords = typeof crop.polygon_area === 'string' ? JSON.parse(crop.polygon_area) : crop.polygon_area;
                            if (coords && coords.length > 0) {
                                document.getElementById('polygon_area').value = JSON.stringify(coords);
                                document.getElementById('btn-clear-polygon').style.display = 'inline-block';
                                
                                coords.forEach(c => {
                                    polygonPoints.push(Cesium.Cartesian3.fromDegrees(c.lng, c.lat));
                                });
                                
                                mapMarker = viewer.entities.add({
                                    position: polygonPoints[0],
                                    point: { pixelSize: 14, color: Cesium.Color.YELLOW, outlineColor: Cesium.Color.WHITE, outlineWidth: 2 }
                                });
                                
                                if (polygonPoints.length >= 3) {
                                    drawingPolygon = viewer.entities.add({
                                        polygon: {
                                            hierarchy: new Cesium.PolygonHierarchy(polygonPoints),
                                            material: Cesium.Color.fromCssColorString('#10b981').withAlpha(0.5),
                                            outline: true,
                                            outlineColor: Cesium.Color.YELLOW,
                                            outlineWidth: 3
                                        }
                                    });
                                } else if (polygonPoints.length === 2) {
                                    drawingPolyline = viewer.entities.add({
                                        polyline: {
                                            positions: polygonPoints,
                                            width: 3,
                                            material: Cesium.Color.YELLOW
                                        }
                                    });
                                }
                                updateClimateFeedback(parseFloat(crop.latitude), parseFloat(crop.longitude));
                            }
                        } catch(e) {}
                    } else if (crop.latitude) {
                        mapMarker = viewer.entities.add({
                            position: Cesium.Cartesian3.fromDegrees(parseFloat(crop.longitude), parseFloat(crop.latitude)),
                            point: { pixelSize: 14, color: Cesium.Color.YELLOW, outlineColor: Cesium.Color.WHITE, outlineWidth: 2 }
                        });
                        updateClimateFeedback(parseFloat(crop.latitude), parseFloat(crop.longitude));
                    }
                }
            } catch (err) {
                console.warn("Map Init Error:", err);
                document.getElementById('crop-map').innerHTML = '<div class="alert alert-danger m-3">Error al cargar el mapa 3D.</div>';
            }
        }

        document.getElementById('crop-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submit-btn');
            
            if (submitBtn.disabled) return;
            submitBtn.disabled = true;
            const originalText = submitBtn.innerText;
            submitBtn.innerHTML = `<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Guardando...`;

            try {
                const currentUser = await AuthObj.getCurrentUser();
                const payload = {
                    user_id: editMode ? crop.user_id : currentUser.id,
                    name: document.getElementById('name').value,
                    description: document.getElementById('description').value,
                    sowing_date: document.getElementById('sowing_date').value,
                    latitude: document.getElementById('latitude').value || null,
                    longitude: document.getElementById('longitude').value || null,
                    polygon_area: document.getElementById('polygon_area').value ? JSON.parse(document.getElementById('polygon_area').value) : null
                };

                if (editMode) {
                    await window.DB.deleteCrop(crop.id);
                    payload.id = crop.id;
                }

                await window.DB.createCrop(payload);
                window.location.href = 'dashboard.html';
            } catch (err) {
                console.error("Submission error:", err);
                submitBtn.disabled = false;
                submitBtn.innerText = originalText;
                if (window.Swal) {
                    Swal.fire({ icon: 'error', title: 'Error', text: 'No se pudo guardar el cultivo. Intenta de nuevo.' });
                }
            }
        });

        async function updateClimateFeedback(lat, lon) {
            if(!CONFIG.OPENWEATHERMAP_API_KEY) return;
            const url = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&lang=es&appid=${CONFIG.OPENWEATHERMAP_API_KEY}`;
            const feedback = document.getElementById('climate-feedback');
            feedback.style.display = 'block';
            feedback.innerHTML = 'Consultando clima...';
            try {
                const res = await fetch(url);
                const data = await res.json();
                const temp = data.main.temp;
                const humidity = data.main.humidity;

                let validationHtml = '';
                const normalize = (s) => (s || "").toLowerCase()
                    .normalize("NFD")
                    .replace(/[\u0300-\u036f]/g, "")
                    .trim();

                const selectedCropName = normalize(document.getElementById('name').value);
                const catalog = window.CROP_CATALOG || {};
                
                const catalogKeys = Object.keys(catalog);
                const matchKey = catalogKeys.find(k => normalize(catalog[k].name) === selectedCropName) || 
                                 catalogKeys.find(k => selectedCropName.includes(normalize(catalog[k].name)) || normalize(catalog[k].name).includes(selectedCropName));
                
                const cropData = matchKey ? catalog[matchKey] : null;

                if (cropData) {
                    const tempOk = temp >= cropData.min_temp && temp <= cropData.max_temp;
                    const humOk = humidity >= cropData.min_humidity && humidity <= cropData.max_humidity;

                    if (!tempOk || !humOk) {
                        validationHtml = `
                            <div class="alert alert-warning mt-2 border-warning animate__animated animate__shakeX">
                                <strong>⚠️ Advertencia Geográfica:</strong> 
                                ${!tempOk ? `La temperatura local (${temp}°C) no es ideal para ${cropData.name} (${cropData.min_temp}-${cropData.max_temp}°C).` : ''}
                                ${!humOk ? ` La humedad (${humidity}%) está fuera del rango óptimo (${cropData.min_humidity}-${cropData.max_humidity}%).` : ''}
                                <br><small>Te sugerimos considerar sistemas de control climático o invernaderos.</small>
                            </div>
                        `;
                    } else {
                        validationHtml = `
                            <div class="alert alert-success mt-2 border-success">
                                <strong>✅ Zona Apta:</strong> El clima en esta ubicación parece ideal para sembrar ${cropData.name}.
                            </div>
                        `;
                    }
                }

                feedback.innerHTML = `
                <div class="d-flex flex-wrap gap-2 mt-3">
                    <div class="flex-fill p-3 bg-light rounded border text-center"><strong class="d-block mb-1">Temperatura</strong> ${temp}°C</div>
                    <div class="flex-fill p-3 bg-light rounded border text-center"><strong class="d-block mb-1">Humedad</strong> ${humidity}%</div>
                    <div class="flex-fill p-3 bg-light rounded border text-center"><strong class="d-block mb-1">Clima</strong> <span class="text-capitalize">${data.weather[0].description}</span></div>
                </div>
                ${validationHtml}`;
            } catch (err) {
                feedback.innerHTML = 'Error consultando clima.';
            }
        }

        window.geolocateMe = function() {
            if(navigator.geolocation && window.viewer) {
                navigator.geolocation.getCurrentPosition(pos => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    viewer.camera.flyTo({ destination: Cesium.Cartesian3.fromDegrees(lng, lat, 3000.0) });
                    if(window.Swal) Swal.fire({toast: true, position: 'top-end', icon: 'success', title: 'Ubicación detectada', showConfirmButton: false, timer: 2000});
                });
            }
        };

        document.getElementById('map-search-btn').addEventListener('click', async () => {
            const query = document.getElementById('map-search-input').value;
            if (!query) return;
            const res = document.getElementById('crop-search-results');
            res.innerHTML = '<div class="text-center p-2"><div class="spinner-border spinner-border-sm text-primary"></div></div>';
            res.classList.add('active');
            try {
                const req = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
                const data = await req.json();
                res.innerHTML = '';
                if(data.length === 0) {
                    res.innerHTML = '<div class="p-2 text-muted">No se encontraron resultados.</div>';
                    setTimeout(() => res.classList.remove('active'), 2000);
                    return;
                }
                data.slice(0,5).forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'map-search-item';
                    div.innerHTML = `<i class="bi bi-geo-alt me-2 text-primary"></i> ${item.display_name}`;
                    div.onclick = () => {
                        if(window.viewer) window.viewer.camera.flyTo({ destination: Cesium.Cartesian3.fromDegrees(parseFloat(item.lon), parseFloat(item.lat), 5000.0) });
                        res.classList.remove('active');
                    };
                    res.appendChild(div);
                });
            } catch (e) {
                res.innerHTML = '<div class="p-2 text-danger">Error al buscar.</div>';
            }
        });

        document.getElementById('btn-clear-polygon').addEventListener('click', () => {
            polygonPoints = [];
            if(drawingPolygon) { viewer.entities.remove(drawingPolygon); drawingPolygon = null; }
            if(drawingPolyline) { viewer.entities.remove(drawingPolyline); drawingPolyline = null; }
            if(mapMarker) { viewer.entities.remove(mapMarker); mapMarker = null; }
            document.getElementById('latitude').value = '';
            document.getElementById('longitude').value = '';
            document.getElementById('polygon_area').value = '';
            document.getElementById('btn-clear-polygon').style.display = 'none';
        });

        const nameInput = document.getElementById('name');
        const suggestionsBox = document.getElementById('catalog-suggestions');
        const sheetPreview = document.getElementById('catalog-sheet-preview');

        nameInput.addEventListener('input', () => {
            const val = nameInput.value.toLowerCase().trim();
            suggestionsBox.innerHTML = '';
            if (val.length < 2) {
                suggestionsBox.style.display = 'none';
                return;
            }

            const matches = Object.values(window.CROP_CATALOG || {}).filter(c => 
                c.name.toLowerCase().includes(val)
            ).slice(0, 5);

            if (matches.length > 0) {
                matches.forEach(m => {
                    const item = document.createElement('button');
                    item.type = 'button';
                    item.className = 'list-group-item list-group-item-action py-2';
                    item.innerHTML = `<strong>${m.name}</strong> <small class="text-muted">(${m.scientific_name})</small>`;
                    item.onclick = () => selectFromCatalog(m);
                    suggestionsBox.appendChild(item);
                });
                suggestionsBox.style.display = 'block';
            } else {
                suggestionsBox.style.display = 'none';
            }
        });

        function selectFromCatalog(cropData) {
            nameInput.value = cropData.name;
            suggestionsBox.style.display = 'none';
            
            sheetPreview.style.display = 'block';
            sheetPreview.innerHTML = `
                <div class="alert border-success bg-white shadow-sm p-3">
                    <div class="d-flex align-items-center mb-2">
                        <span class="fs-4 me-2">📋</span>
                        <h6 class="mb-0 text-success">Ficha Técnica: ${cropData.name}</h6>
                    </div>
                    <p class="small text-muted mb-2"><em>${cropData.scientific_name}</em></p>
                    <p class="small mb-2">${cropData.description}</p>
                    <div class="row g-2 small">
                        <div class="col-6"><strong>Temp:</strong> ${cropData.min_temp}°C - ${cropData.max_temp}°C</div>
                        <div class="col-6"><strong>Humedad:</strong> ${cropData.min_humidity}% - ${cropData.max_humidity}%</div>
                        <div class="col-12"><strong>Suelo:</strong> ${cropData.soil_type}</div>
                    </div>
                    <div class="mt-2 text-primary small">
                        <i class="bi bi-info-circle"></i> Al guardar, se generará el plan de abonado técnico.
                    </div>
                </div>
            `;
            
            const lat = document.getElementById('latitude').value;
            const lon = document.getElementById('longitude').value;
            if (lat && lon) updateClimateFeedback(lat, lon);
        }

        document.addEventListener('click', (e) => {
            if (e.target !== nameInput) suggestionsBox.style.display = 'none';
        });

        document.addEventListener('DOMContentLoaded', initCropForm);
    </script>
</body>
</html>
