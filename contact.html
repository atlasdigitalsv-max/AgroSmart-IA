<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - AgroSmart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/modern_agro.css">
</head>
<body class="page-body">
    <div id="navbar-container"></div>

    <section class="py-5">
        <div class="container animate-slide-up">
            <div class="contact-card agro-card p-4 mx-auto" style="max-width: 600px;">
                <h2 class="text-center mb-4 dashboard-title">Contáctenos</h2>
                <form id="contact-form">
                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" id="contact_name" class="form-control" required placeholder="Escribe tu nombre">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Correo electrónico</label>
                        <input type="email" id="contact_email" class="form-control" required placeholder="Tu correo electrónico">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Asunto</label>
                        <input type="text" id="contact_subject" class="form-control" required placeholder="Motivo de contacto">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Mensaje</label>
                        <textarea id="contact_message" rows="5" class="form-control" required placeholder="Escribe tu mensaje aquí..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill fw-bold">Enviar mensaje</button>
                </form>
            </div>
        </div>
    </section>

    <footer class="bg-light py-4 border-top mt-5">
        <div class="container text-center">
            <p class="text-muted small m-0">&copy; 2026 AgroSmart - El Futuro del Campo.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/config.js"></script>
    <script src="js/database.js"></script>
    <script src="js/layout.js"></script>
    <script>
        async function initContact() {
            if (window.initLayout) await window.initLayout('contact');
            
            // Inicializar EmailJS
            if (typeof emailjs !== 'undefined' && window.CONFIG && window.CONFIG.EMAILJS_PUBLIC_KEY) {
                emailjs.init(window.CONFIG.EMAILJS_PUBLIC_KEY);
            }

            const user = await AuthObj.getCurrentUser();
            const emailInput = document.getElementById('contact_email');
            const subjectInput = document.getElementById('contact_subject');
            
            // Auto-rellenar y bloquear el correo si el usuario está registrado
            if (user && user.id !== 'guest' && !user._isStub && emailInput) {
                emailInput.value = user.email;
                emailInput.setAttribute('readonly', 'readonly');
            } else if (emailInput) {
                emailInput.value = '';
                emailInput.removeAttribute('readonly');
            }

            // Capturar asunto de la URL (si viene de services.html)
            const urlParams = new URLSearchParams(window.location.search);
            const prefilledSubject = urlParams.get('subject');
            if (prefilledSubject && subjectInput) {
                subjectInput.value = prefilledSubject;
            }
            
            const contactForm = document.getElementById('contact-form');
            if (contactForm) {
                contactForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    
                    const name = document.getElementById('contact_name').value;
                    const email = document.getElementById('contact_email').value;
                    const subject = document.getElementById('contact_subject').value;
                    const message = document.getElementById('contact_message').value;
                    const submitBtn = contactForm.querySelector('button[type="submit"]');

                    submitBtn.disabled = true;
                    submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> Enviando...';
                    
                    try {
                        await emailjs.send(window.CONFIG.EMAILJS_SERVICE_ID, window.CONFIG.EMAILJS_TEMPLATE_ID, {
                            to_email: 'atlasdigitalsv@gmail.com', // Forzamos el envío a atlasdigitalsv
                            from_name: name,
                            reply_to: email,
                            subject: subject,
                            message: message
                        });
                        
                        Swal.fire({
                            icon: 'success',
                            title: 'Mensaje Enviado',
                            text: 'Tu mensaje fue enviado exitosamente a AgroSmart. Nos pondremos en contacto contigo pronto.',
                            confirmButtonColor: '#10b981'
                        });
                        
                        contactForm.reset();
                        // Restaurar el email si es usuario logueado
                        if (user && user.id !== 'guest' && !user._isStub && emailInput) {
                            emailInput.value = user.email;
                        }
                    } catch (error) {
                        console.error("Error enviando correo:", error);
                        Swal.fire({
                            icon: 'error',
                            title: 'Error de envío',
                            text: 'Hubo un problema al enviar tu mensaje. Por favor intenta más tarde.',
                            confirmButtonColor: '#10b981'
                        });
                    } finally {
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'Enviar mensaje';
                    }
                });
            }
        }
        document.addEventListener('DOMContentLoaded', initContact);
    </script>
</body>
</html>
